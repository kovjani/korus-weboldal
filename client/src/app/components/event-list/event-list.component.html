<div class="list-container">
  <div class="header" *ngIf="authService.isAdmin()">
    <h2>Fellépések kezelése</h2>
    <button mat-raised-button color="accent" routerLink="/event-form">
      <mat-icon>add</mat-icon> Új hozzáadása
    </button>
  </div>

  <mat-card *ngFor="let p of (events$ | async)" class="perf-card">
    <mat-card-header>
      <mat-card-title>{{p.title}}</mat-card-title>
      <mat-card-subtitle>{{p.date | date:'yyyy.MM.dd'}} | {{p.place}}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>{{p.description}}</p>
    </mat-card-content>
    <mat-card-actions *ngIf="authService.isAdmin()">
      <button mat-icon-button color="primary"
              [routerLink]="['/event-form', p.id]"
              [state]="{ data: p }">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="deleteEvent(p.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-card-actions>
  </mat-card>
</div>
